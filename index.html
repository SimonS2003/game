<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/mapa.css">
  <link rel="stylesheet" href="styles/hud.css">
</head>
<body>

<div class="map-container">
  <h1> Mapa WAR</h1>

  <div class="countries" id="mapa"></div>

  <div class="topo">
    <div class="lado esquerdo"></div>

    <div class="lado direito">
      <div class="box vermelho", id="jogador-vermelho">
        <span class="player">Player 1</span>
        <!-- <span class="numero">60</span> -->
        <!-- <span class="porcentagem">30%</span> -->
         <img
      src="./assets/personagem-vermelho.png"
      alt="Jogador vermelho"
    >
      </div>

      <div class="box azul", id="jogador-azul">
        <span class="player">Player 2</span>
        <!-- <span class="numero">100</span> -->
        <!-- <span class="porcentagem">90%</span> -->
         <img
      src="./assets/personagem-azul.png"
      alt="Jogador azul"
    >
      </div>
    </div>
  </div>

  <div class="hud">
    <!-- <div id="nomePais">Passe o mouse em um território</div> -->
    <div class="timer">
      <span id="tempo">05:00</span>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
