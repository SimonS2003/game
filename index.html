<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa</title>

  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      background: #222;
    }

    body {
  background-image: url("background.png"); /* ou .jpg */
  background-size: cover;       /* cobre toda a tela */
  background-position: center;  /* centraliza */
  background-repeat: no-repeat; /* não repete */
}

    .map-container {
      position: relative;
      width: 800px; /* ajuste conforme seu mapa */
      margin: auto;
    }

    .map-container svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    .background {
        height: 100%;
        width: 100%;
      z-index: 1;
    }

    .countries {
      z-index: 2;
    }

    .countries path {
      cursor: pointer;
      transition: 0.2s;
    }

    .countries path:hover {
      fill: orange;
    }

        html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        }

    .map-container {
    width: 100vw;   /* 90% da largura da tela */
    height: 85vh;  /* 90% da altura da tela */
    margin: auto;  /* centraliza */
    position: relative;
    }

    .map-container svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    }

    /* posição: embaixo e centralizado */
    .timer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        
        background: #111;
        padding: 15px 25px;
        border-radius: 10px;
        border: 2px solid white;
    }

    /* estilo do número */
    #tempo {
        color: white;
        font-size: 32px;
        font-family: monospace;
        letter-spacing: 2px;
    }

    body {
    margin: 0;
    background: #1a1a1a;
    font-family: Arial, sans-serif;
}

    /* container geral */
    .topo {
        position: fixed;
        top: 20px;
        left: 0;
        width: 100%;
    }

    /* lados */
    .lado {
    display: flex;
    flex-direction: column; /* coloca um embaixo do outro */
    gap: 10px;
    position: absolute;
}

.esquerdo {
    left: 20px;
    top: 20px;
}

.direito {
    right: 20px;
    top: 20px;
}

    /* caixas */
    .box {
    width: 140px;
    height: 80px;
    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 10px;

    color: white;
    font-weight: bold;
}

/* coluna da direita */
.info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

/* nome do player */
.player {
    font-size: 14px;
}

    /* cores */
    .verde { background: #2ecc71; }
    .vermelho { background: #e74c3c; }
    .amarelo { background: #f1c40f; color: black; }
    .azul { background: #3498db; }

    /* textos */
    .numero {
        font-size: 22px;
    }

    .porcentagem {
        font-size: 16px;
    }

    .background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
}

.background svg {
  width: 100%;
  height: 100%;
}

.hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 10px;
}


.timer {
    background: #111;

    padding: 15px 25px;

    border-radius: 10px;

    border: 2px solid white;
}

#tempo {
    color: white;
    font-size: 32px;
    font-family: monospace;
}

#nomePais {
    position: fixed;

    bottom: 90px; /* sobe ele acima do timer */

    left: 50%;
    transform: translateX(-50%);

    background: rgba(0,0,0,0.85);
    color: white;

    padding: 10px 10px;
    border-radius: 8px;

    font-family: Arial;
    font-size: 16px;

    z-index: 9999;

    white-space: nowrap;
}
    
  </style>

  
</head>
