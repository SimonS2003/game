<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/mapa.css">
  <link rel="stylesheet" href="styles/hud.css">
</head>
<body>

<div class="titulo-container">
  <h1> Mapa WAR</h1>

  <div class="countries" id="mapa"></div>

  <div class="topo">
    <div class="lado esquerdo"></div>

    <div class="lado esquerdo">
      <div class="box vermelho">
        <span class="player">Player 1</span>
        <span class="objetivo">Objetivo:</span>
        <span class="territorio conquistados">conquistados:</span>
        <span class="porcentagem conquistados"></span>
      </div>
    </div>

    <div class="lado direito">
      <div class="box azul">
        <span class="player">Player 2</span>
        <span class="objetivo">Objetivo:</span>
        <span class="territorio conquistados">conquistados:</span>
        <span class="porcentagem conquistados"></span>
      </div>
    </div>
  </div>

  <div class="hud">
    <div id="nomePais">Passe o mouse em um território</div>
    <div class="timer">
      <span id="tempo">05:00</span>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
